name: masters
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - cartopy
  - dask
  - matplotlib
  - numpy
  - pandas
  - rtree
  - scipy
  - trimesh
  - typing_extensions
  - xarray
  - ipykernel
  - google-cloud-storage
  - ipywidgets
  - pip:
    - --find-links https://repo.radeon.com/rocm/manylinux/rocm-rel-6.2.4/
    - --extra-index-url https://download.pytorch.org/whl/
    - jax[rocm]
    - torch==2.6.0+rocm6.2.4
    - torchaudio==2.6.0+rocm6.2.4
    - torchvision==0.21.0+rocm6.2.4
    - wandb
    - chex
    - colabtools
    - dinosaur-dycore
    - dm-haiku
    - dm-tree
    - jraph
    - pytough
    - xarray-tensorstore